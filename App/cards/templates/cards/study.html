{% extends "cards/layout.html" %}

{% block body %}
    <h3> {{ card.question }} </h3>
    <button onclick="document.getElementById('ans').style.display='block'"> Reveal Answer</button>

    <div id="ans" style="display:none">
        <div>{{ card.answer }}</div>
    </div>
    <form action="{% url 'study' set_id name %}" method="post">
        {% csrf_token %}
        {{ grade }}
        <input type="hidden" name="card_id" value="{{ card_id }}">
        <input type="submit">
    </form>

    <div>Cards Remaining: {{ remaining_cards }}</div>
{% endblock %}
