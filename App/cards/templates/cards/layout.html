<!DOCTYPE html>

<html lang="en">

<head>
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
    <ul class="nav">
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'search' %}"> Search </a>
        </li>
        {% if user.is_authenticated %}
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'index' %}"> Your Saved Sets </a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'create' %}"> Create New Set</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'logout' %}"> Log Out</a>
        </li>
        {% else %}
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'login' %}"> Log In </a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'register' %}"> Register </a>
        </li>
        {% endif %}
    </ul> 
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% block body %}
    {% endblock %}
</body>
</html>
